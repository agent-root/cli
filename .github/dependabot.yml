version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # TypeScript majors require coordinated cleanup. Handle manually.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Playwright majors can change browser behavior. Handle manually so
      # the screenshot recipe can be verified after upgrade.
      - dependency-name: "playwright"
        update-types: ["version-update:semver-major"]
      # vitest majors occasionally break vi.mock semantics. Handle manually.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/coverage-v8"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
