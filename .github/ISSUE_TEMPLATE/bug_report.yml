name: Bug report
description: Report something that's broken or behaving incorrectly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please be specific. The more we know, the faster we can fix it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
      placeholder: "agent-root resolve hangs when the domain has no TXT record"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `agent-root --version` or the version field in package.json.
      placeholder: "e.g. 0.X.Y"
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run `npx agent-root resolve nonexistent.example`
        2. Wait
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version.
      placeholder: |
        - OS: macOS 14.5
        - Node: 22.11.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Use `--json` for machine-readable logs.
      render: shell
